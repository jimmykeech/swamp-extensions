manifestVersion: 1
name: "@jamesakeech/hardcover"
version: "2026.07.20.2"
description: "Monitor a single user's Hardcover reading activity via the Hardcover GraphQL API — profile, the whole tracked library (shelf status, rating, review, pages, read dates), and individual reading sessions (start/finish dates, progress). Read-only, token-authenticated."

repository: https://github.com/jimmykeech/swamp-extensions

# Source, README, and LICENSE all live alongside this manifest in hardcover/.
paths:
  base: manifest

additionalFiles:
  - README.md
  - LICENSE.md

models:
  - hardcover.ts

# Universal — the extension makes only HTTP calls, no platform-specific binaries.
platforms: []

labels:
  - hardcover
  - books
  - reading
